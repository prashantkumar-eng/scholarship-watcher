name: Website Watcher

on:
  workflow_dispatch: {}   # lets you run it manually from the Actions tab
  schedule:
    # Scrape every 3 hours (UTC). GitHub may delay by a few minutes - normal.
    - cron: "0 */3 * * *"
    # Daily digest email at 13:30 UTC = 19:00 IST (7 PM India time)
    - cron: "30 13 * * *"

permissions:
  contents: write   # needed to commit the updated state/ snapshots back

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run watcher (scrape and save findings)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python watcher.py

      - name: Send 7 PM digest email (only on the daily 13:30 UTC schedule)
        if: github.event.schedule == '30 13 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python watcher.py --send-digest

      - name: Commit updated snapshots
        run: |
          git config user.name "watcher-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update snapshots [skip ci]"
          git push
